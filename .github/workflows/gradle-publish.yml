name: Build Mod

on:
  push:
    branches: [ main, main-26.1, main-26.2 ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PanoramaScreenMake-Build
          path: build/libs/*.jar
